# pnpm 11: build-skriptlariga ruxsat. Aks holda "Ignored build scripts" advisory
# `pnpm install`'ni non-zero qaytaradi va hatto `pnpm test/typecheck/lint` ham
# bloklanadi (pnpm script'dan oldin deps-status tekshiradi).
# esbuild → vitest; sharp → next/image; @clerk/shared → auth; unrs-resolver → eslint.
allowBuilds:
  esbuild: true
  sharp: true
  "@clerk/shared": true
  unrs-resolver: true
