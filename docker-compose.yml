services:
  postgres:
    image: postgres:16-alpine
    container_name: adprofit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adprofit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adprofit}
      POSTGRES_DB: ${POSTGRES_DB:-adprofit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adprofit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adprofit-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-adprofit}:${POSTGRES_PASSWORD:-adprofit}@postgres:5432/${POSTGRES_DB:-adprofit}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: adprofit-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-adprofit}:${POSTGRES_PASSWORD:-adprofit}@postgres:5432/${POSTGRES_DB:-adprofit}
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: adprofit-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
